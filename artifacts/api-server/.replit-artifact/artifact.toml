kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api", "/api/ws"]

[services.development]
run = "cd artifacts/api-server && mvn spring-boot:run -q"

[services.production]

[services.production.build]
args = ["mvn", "-f", "artifacts/api-server/pom.xml", "package", "-DskipTests", "-q"]

[services.production.run]
args = ["java", "-jar", "artifacts/api-server/target/debatesphere-api.jar"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
