openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: DebateSphere API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: debates
    description: Debate rooms
  - name: arguments
    description: Arguments and replies
  - name: votes
    description: Voting
  - name: users
    description: User profiles
  - name: analytics
    description: Analytics and trending
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /debates:
    get:
      operationId: listDebates
      tags: [debates]
      summary: List debates
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [latest, trending, most_active]
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of debates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebateList"
    post:
      operationId: createDebate
      tags: [debates]
      summary: Create a new debate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DebateInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Debate"

  /debates/trending:
    get:
      operationId: getTrendingDebates
      tags: [debates]
      summary: Get trending debates
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Trending debates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Debate"

  /debates/categories:
    get:
      operationId: getCategories
      tags: [debates]
      summary: Get debate categories with counts
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /debates/{id}:
    get:
      operationId: getDebate
      tags: [debates]
      summary: Get a debate by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Debate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Debate"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateDebate
      tags: [debates]
      summary: Update a debate
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DebateUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Debate"
    delete:
      operationId: deleteDebate
      tags: [debates]
      summary: Delete a debate
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /debates/{id}/join:
    post:
      operationId: joinDebate
      tags: [debates]
      summary: Join a debate room
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinResponse"

  /debates/{id}/arguments:
    get:
      operationId: listArguments
      tags: [arguments]
      summary: List arguments for a debate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Arguments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Argument"
    post:
      operationId: createArgument
      tags: [arguments]
      summary: Post an argument
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArgumentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Argument"

  /arguments/{id}:
    patch:
      operationId: updateArgument
      tags: [arguments]
      summary: Update an argument
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArgumentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Argument"
    delete:
      operationId: deleteArgument
      tags: [arguments]
      summary: Delete an argument
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /arguments/{id}/replies:
    get:
      operationId: listReplies
      tags: [arguments]
      summary: List replies to an argument
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Replies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reply"
    post:
      operationId: createReply
      tags: [arguments]
      summary: Reply to an argument
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reply"

  /votes/argument/{id}:
    post:
      operationId: voteArgument
      tags: [votes]
      summary: Vote on an argument
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoteInput"
      responses:
        "200":
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResult"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/{id}/debates:
    get:
      operationId: getUserDebates
      tags: [users]
      summary: Get debates created by a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User debates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Debate"

  /analytics/dashboard:
    get:
      operationId: getAnalyticsDashboard
      tags: [analytics]
      summary: Get analytics dashboard summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsDashboard"

  /analytics/trending-categories:
    get:
      operationId: getTrendingCategories
      tags: [analytics]
      summary: Get trending categories with engagement data
      responses:
        "200":
          description: Trending categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendingCategory"

  /analytics/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [analytics]
      summary: Get user reputation leaderboard
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /analytics/activity:
    get:
      operationId: getActivityTimeline
      tags: [analytics]
      summary: Get platform activity over time
      responses:
        "200":
          description: Activity data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityPoint"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    RegisterInput:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, username, email, role, reputation, tier, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [USER, ADMIN]
        reputation:
          type: integer
        tier:
          type: string
          enum: [Bronze Debater, Silver Debater, Gold Debater, Diamond Debater]
        bio:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    UserProfile:
      type: object
      required: [id, username, role, reputation, tier, debateCount, argumentCount, totalVotesReceived, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
        reputation:
          type: integer
        tier:
          type: string
        bio:
          type: ["string", "null"]
        debateCount:
          type: integer
        argumentCount:
          type: integer
        totalVotesReceived:
          type: integer
        createdAt:
          type: string
          format: date-time

    Debate:
      type: object
      required: [id, title, description, category, tags, status, authorId, author, argumentCount, participantCount, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, closed, archived]
        authorId:
          type: integer
        author:
          $ref: "#/components/schemas/User"
        argumentCount:
          type: integer
        participantCount:
          type: integer
        viewCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DebateList:
      type: object
      required: [debates, total]
      properties:
        debates:
          type: array
          items:
            $ref: "#/components/schemas/Debate"
        total:
          type: integer

    DebateInput:
      type: object
      required: [title, description, category]
      properties:
        title:
          type: string
          minLength: 10
        description:
          type: string
          minLength: 20
        category:
          type: string
        tags:
          type: array
          items:
            type: string

    DebateUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, closed, archived]

    Category:
      type: object
      required: [name, count]
      properties:
        name:
          type: string
        count:
          type: integer

    JoinResponse:
      type: object
      required: [debateId, participantCount]
      properties:
        debateId:
          type: integer
        participantCount:
          type: integer

    Argument:
      type: object
      required: [id, content, debateId, authorId, author, upvotes, downvotes, replyCount, stance, createdAt, updatedAt]
      properties:
        id:
          type: integer
        content:
          type: string
        debateId:
          type: integer
        authorId:
          type: integer
        author:
          $ref: "#/components/schemas/User"
        upvotes:
          type: integer
        downvotes:
          type: integer
        replyCount:
          type: integer
        stance:
          type: string
          enum: [for, against, neutral]
        userVote:
          type: ["string", "null"]
        isFlagged:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ArgumentInput:
      type: object
      required: [content, stance]
      properties:
        content:
          type: string
          minLength: 10
        stance:
          type: string
          enum: [for, against, neutral]

    ArgumentUpdate:
      type: object
      properties:
        content:
          type: string
          minLength: 10

    Reply:
      type: object
      required: [id, content, argumentId, authorId, author, upvotes, createdAt]
      properties:
        id:
          type: integer
        content:
          type: string
        argumentId:
          type: integer
        authorId:
          type: integer
        author:
          $ref: "#/components/schemas/User"
        upvotes:
          type: integer
        createdAt:
          type: string
          format: date-time

    ReplyInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    VoteInput:
      type: object
      required: [vote]
      properties:
        vote:
          type: string
          enum: [up, down, none]

    VoteResult:
      type: object
      required: [upvotes, downvotes, userVote]
      properties:
        upvotes:
          type: integer
        downvotes:
          type: integer
        userVote:
          type: ["string", "null"]

    AnalyticsDashboard:
      type: object
      required: [totalDebates, activeDebates, totalArguments, totalUsers, totalVotes, mostActiveDebates, controversialTopics]
      properties:
        totalDebates:
          type: integer
        activeDebates:
          type: integer
        totalArguments:
          type: integer
        totalUsers:
          type: integer
        totalVotes:
          type: integer
        mostActiveDebates:
          type: array
          items:
            $ref: "#/components/schemas/Debate"
        controversialTopics:
          type: array
          items:
            $ref: "#/components/schemas/Debate"

    TrendingCategory:
      type: object
      required: [name, debateCount, argumentCount, engagementScore]
      properties:
        name:
          type: string
        debateCount:
          type: integer
        argumentCount:
          type: integer
        engagementScore:
          type: number

    LeaderboardEntry:
      type: object
      required: [rank, user, reputation, tier, debateCount, argumentCount]
      properties:
        rank:
          type: integer
        user:
          $ref: "#/components/schemas/User"
        reputation:
          type: integer
        tier:
          type: string
        debateCount:
          type: integer
        argumentCount:
          type: integer

    ActivityPoint:
      type: object
      required: [date, debates, arguments, votes]
      properties:
        date:
          type: string
        debates:
          type: integer
        arguments:
          type: integer
        votes:
          type: integer
